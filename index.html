
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>محمد حسین | کارت معرفی</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
            padding: 20px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: #292929;
            border-radius: 40px;
            padding: 45px 35px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8),
                        0 0 0 2px rgba(255, 200, 0, 0.15);
            border: 1px solid rgba(255, 200, 0, 0.1);
            text-align: center;
            transition: 0.3s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.9),
                        0 0 0 3px rgba(255, 200, 0, 0.25);
        }

        .avatar {
            width: 130px;
            height: 130px;
            margin: 0 auto 22px;
            background: linear-gradient(135deg, #FFC800, #f5a800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 35px rgba(255, 200, 0, 0.3);
            border: 4px solid #292929;
            outline: 2px solid rgba(255, 200, 0, 0.3);
            position: relative;
        }

        .avatar svg {
            width: 70px;
            height: 70px;
            fill: #292929;
        }

        .name {
            font-size: 38px;
            font-weight: 900;
            color: #FFC800;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-shadow: 0 2px 20px rgba(255, 200, 0, 0.15);
            word-break: keep-all;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 200, 0, 0.08);
            padding: 6px 24px;
            border-radius: 40px;
            font-size: 15px;
            color: #FFC800;
            border: 1px solid rgba(255, 200, 0, 0.12);
            margin-bottom: 18px;
            font-weight: 700;
        }

        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFC800, transparent);
            margin: 4px auto 20px;
            border-radius: 10px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 10px;
            margin: 20px 0 30px;
        }

        .skill-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 16px;
            color: #e8e8e8;
            border: 1px solid rgba(255, 200, 0, 0.08);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            transition: 0.2s ease;
            white-space: nowrap;
        }

        .skill-item:hover {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.2);
            transform: scale(1.03);
        }

        .skill-item .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .skill-item .icon svg {
            width: 22px;
            height: 22px;
            fill: #FFC800;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 200, 0, 0.08);
            border-radius: 60px;
            padding: 12px 26px;
            font-size: 17px;
            font-weight: 700;
            color: #e8e8e8;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .social-btn .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            flex-shrink: 0;
        }

        .social-btn .icon svg {
            width: 24px;
            height: 24px;
            fill: #FFC800;
            transition: 0.25s ease;
        }

        .social-btn:hover {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.2);
            transform: translateY(-3px);
        }

        .social-btn.primary {
            background: #FFC800;
            border: none;
            color: #292929;
            box-shadow: 0 6px 25px rgba(255, 200, 0, 0.25);
        }

        .social-btn.primary .icon svg {
            fill: #292929;
        }

        .social-btn.primary:hover {
            box-shadow: 0 10px 35px rgba(255, 200, 0, 0.4);
            transform: translateY(-3px) scale(1.02);
            background: #ffd633;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 700;
            letter-spacing: 0.3px;
            border-top: 1px solid rgba(255, 200, 0, 0.05);
            padding-top: 22px;
        }

        @media (max-width: 500px) {
            .card { padding: 30px 18px 28px; }
            .name { font-size: 30px; }
            .skill-item { font-size: 14px; padding: 8px 14px; }
            .social-btn { font-size: 14px; padding: 10px 16px; }
            .avatar { width: 110px; height: 110px; }
            .avatar svg { width: 58px; height: 58px; }
            .skill-item .icon svg { width: 18px; height: 18px; }
            .social-btn .icon svg { width: 20px; height: 20px; }
        }

        @media (max-width: 420px) {
            .skill-item { font-size: 12px; padding: 6px 12px; gap: 6px; }
            .social-btn { font-size: 12px; padding: 8px 12px; gap: 6px; }
            .social-btn .icon { width: 20px; height: 20px; }
            .social-btn .icon svg { width: 16px; height: 16px; }
            .name { font-size: 26px; }
        }
    </style>
</head>
<body>

</body>
</html>
