<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mohamad hossein | moarefi</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@700;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            font-family: 'Vazirmatn', sans-serif;
            font-weight: 700;
            padding: 20px;
        }

        /* ===== کارت اصلی ===== */
        .card {
            max-width: 480px;
            width: 100%;
            background: #292929;
            border-radius: 40px;
            padding: 45px 35px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            border: 3px solid #FFC800;
            text-align: center;
            transition: transform 0.2s ease;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .avatar {
            width: 130px;
            height: 130px;
            margin: 0 auto 22px;
            background: linear-gradient(135deg, #FFC800, #f5a800);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 35px rgba(255, 200, 0, 0.3);
            border: 4px solid #292929;
            outline: 2px solid rgba(255, 200, 0, 0.3);
            position: relative;
        }

        .avatar svg {
            width: 70px;
            height: 70px;
            fill: #292929;
        }

        .name {
            font-size: 38px;
            font-weight: 900;
            color: #FFC800;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            text-shadow: 0 2px 20px rgba(255, 200, 0, 0.15);
            word-break: keep-all;
            font-family: 'Vazirmatn', sans-serif;
        }

        .badge {
            display: inline-block;
            background: rgba(255, 200, 0, 0.08);
            padding: 6px 24px;
            border-radius: 40px;
            font-size: 15px;
            color: #FFC800;
            border: 1px solid rgba(255, 200, 0, 0.12);
            margin-bottom: 18px;
            font-weight: 700;
        }

        .divider {
            width: 70px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #FFC800, transparent);
            margin: 4px auto 20px;
            border-radius: 10px;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px 10px;
            margin: 20px 0 30px;
        }

        .skill-item {
            background: rgba(255, 255, 255, 0.04);
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 16px;
            color: #e8e8e8;
            border: 1px solid rgba(255, 200, 0, 0.08);
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 700;
            transition: 0.2s ease;
            white-space: nowrap;
            cursor: pointer;
        }

        .skill-item:hover {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.2);
            transform: scale(1.03);
        }

        .skill-item .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
        }

        .skill-item .icon svg {
            width: 22px;
            height: 22px;
            fill: #FFC800;
        }

        .socials {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 6px;
        }

        .social-btn {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 200, 0, 0.08);
            border-radius: 60px;
            padding: 12px 26px;
            font-size: 17px;
            font-weight: 700;
            color: #e8e8e8;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.25s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .social-btn .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            flex-shrink: 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .social-btn .icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .social-btn .icon svg {
            width: 28px;
            height: 28px;
            fill: #FFC800;
            transition: 0.25s ease;
        }

        .social-btn:hover {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.2);
            transform: translateY(-3px);
        }

        .social-btn.primary {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 200, 0, 0.08);
            color: #e8e8e8;
            box-shadow: none;
        }

        .social-btn.primary .icon svg {
            fill: #FFC800;
        }

        .social-btn.primary:hover {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.2);
            transform: translateY(-3px);
            box-shadow: none;
        }

        .footer-note {
            margin-top: 30px;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            font-weight: 700;
            letter-spacing: 0.3px;
            border-top: 3px dashed rgba(255, 255, 255, 0.3);
            padding-top: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .footer-note .icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .footer-note .icon svg {
            width: 20px;
            height: 20px;
            fill: #FFC800;
        }

        /* ====================================================
                   صفحه "سایت ها" با کارت‌های مجزا (۱ در ۱)
                   ==================================================== */
        .site-page {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeIn 0.3s ease;
            padding: 20px;
        }

        .site-page.show {
            display: flex;
        }

        .site-box {
            background: #292929;
            border-radius: 40px;
            padding: 30px 25px 25px;
            text-align: center;
            border: 3px solid #FFC800;
            box-shadow: 0 0 80px rgba(255, 200, 0, 0.15);
            max-width: 460px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: scaleUp 0.4s ease;
            font-family: 'Vazirmatn', sans-serif;
        }

        .site-box::-webkit-scrollbar {
            width: 4px;
        }

        .site-box::-webkit-scrollbar-thumb {
            background: #FFC800;
            border-radius: 10px;
        }

        .site-box .header-icon {
            font-size: 42px;
            display: block;
            margin-bottom: 2px;
        }

        .site-box h2 {
            color: #FFC800;
            font-size: 26px;
            font-weight: 900;
            margin-bottom: 2px;
        }

        .site-box .subtitle {
            color: rgba(255, 200, 0, 0.4);
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .site-box .divider-site {
            width: 50px;
            height: 3px;
            background: #FFC800;
            margin: 6px auto 14px;
            border-radius: 10px;
            opacity: 0.3;
        }

        /* ===== لیست کارت‌های سایت (۱ در ۱) ===== */
        .site-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
            margin-bottom: 20px;
        }

        .site-card {
            border-radius: 24px;
            padding: 16px 12px 14px;
            text-decoration: none;
            transition: 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            min-height: 160px;
            justify-content: center;
        }

        .site-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
        }

        /* ===== کارت کالفود ===== */
        .site-card.callfood {
            background: #FFF7EE;
            border: 2px solid #C55A2D;
        }

        .site-card.callfood .site-icon {
            background: #C55A2D;
            color: #FFF7EE;
            border-radius: 16px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .site-card.callfood .site-name {
            color: #C55A2D;
            font-size: 15px;
            font-weight: 900;
        }

        .site-card.callfood .site-desc {
            color: rgba(197, 90, 45, 0.5);
            font-size: 10px;
            font-weight: 700;
        }

        /* ===== کارت زروکس ===== */
        .site-card.zerox {
            background: #FFFFFF;
            border: 2px solid #B61C1C;
        }

        .site-card.zerox .site-icon {
            background: #B61C1C;
            color: #FFFFFF;
            border-radius: 16px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .site-card.zerox .site-name {
            color: #B61C1C;
            font-size: 15px;
            font-weight: 900;
        }

        .site-card.zerox .site-desc {
            color: rgba(182, 28, 28, 0.5);
            font-size: 10px;
            font-weight: 700;
        }

        /* ===== کارت‌های پیش‌فرض ===== */
        .site-card.default {
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 200, 0, 0.08);
        }

        .site-card.default .site-icon {
            background: #FFC800;
            color: #292929;
            border-radius: 16px;
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .site-card.default .site-name {
            color: #FFC800;
            font-size: 15px;
            font-weight: 900;
        }

        .site-card.default .site-desc {
            color: rgba(255, 255, 255, 0.3);
            font-size: 10px;
            font-weight: 700;
        }

        .site-card.default:hover {
            border-color: rgba(255, 200, 0, 0.2);
        }

        /* ===== جای عکس ۱ در ۱ ===== */
        .site-card .site-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 16px;
            background: rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: rgba(0, 0, 0, 0.15);
            overflow: hidden;
            margin-top: 2px;
        }

        .site-card.callfood .site-thumb {
            background: rgba(197, 90, 45, 0.06);
        }

        .site-card.zerox .site-thumb {
            background: rgba(182, 28, 28, 0.04);
        }

        .site-card.default .site-thumb {
            background: rgba(255, 255, 255, 0.02);
        }

        .site-card .site-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .site-card .site-thumb .placeholder {
            font-size: 28px;
            opacity: 0.2;
        }

        .site-box .close-btn {
            background: rgba(255, 200, 0, 0.06);
            border: 1px solid rgba(255, 200, 0, 0.12);
            border-radius: 60px;
            padding: 10px 28px;
            font-size: 15px;
            font-weight: 700;
            color: #FFC800;
            cursor: pointer;
            transition: 0.25s ease;
            font-family: 'Vazirmatn', sans-serif;
        }

        .site-box .close-btn:hover {
            background: rgba(255, 200, 0, 0.12);
            border-color: rgba(255, 200, 0, 0.2);
            transform: scale(1.03);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @media (max-width: 500px) {
            .card { padding: 30px 18px 28px; }
            .name { font-size: 30px; }
            .skill-item { font-size: 14px; padding: 8px 14px; }
            .social-btn { font-size: 14px; padding: 10px 16px; }
            .social-btn .icon { width: 28px; height: 28px; }
            .avatar { width: 110px; height: 110px; }
            .avatar svg { width: 58px; height: 58px; }
            .skill-item .icon svg { width: 18px; height: 18px; }
            .footer-note { font-size: 12px; }
            .footer-note .icon { width: 18px; height: 18px; }
            .footer-note .icon svg { width: 16px; height: 16px; }
            .site-box { padding: 20px 16px; }
            .site-box h2 { font-size: 22px; }
            .site-grid { gap: 10px; }
            .site-card { min-height: 130px; padding: 12px 8px; }
            .site-card .site-icon { width: 40px; height: 40px; font-size: 22px; }
            .site-card .site-name { font-size: 13px; }
        }

        @media (max-width: 420px) {
            .skill-item { font-size: 12px; padding: 6px 12px; gap: 6px; }
            .social-btn { font-size: 12px; padding: 8px 12px; gap: 6px; }
            .social-btn .icon { width: 24px; height: 24px; }
            .name { font-size: 26px; }
            .footer-note { font-size: 11px; }
            .footer-note .icon { width: 16px; height: 16px; }
            .footer-note .icon svg { width: 14px; height: 14px; }
            .site-box h2 { font-size: 18px; }
            .site-card { min-height: 110px; padding: 10px 6px; }
            .site-card .site-icon { width: 34px; height: 34px; font-size: 18px; }
            .site-card .site-name { font-size: 11px; }
            .site-card .site-desc { font-size: 8px; }
        }
    </style>
</head>
<body>

    <!-- ===== کارت اصلی ===== -->
    <div class="card">

        <div class="avatar">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 14c-2.5 0-4.67-1.5-5.8-3.6.18-.4.62-.8 1.2-1.1 1.3-.7 2.8-1.1 4.6-1.1s3.3.4 4.6 1.1c.58.3 1.02.7 1.2 1.1C16.67 18.5 14.5 20 12 20z"/>
            </svg>
        </div>

        <h1 class="name">mohamad hossein</h1>
        <span class="badge">✦ طراح و توسعه‌دهنده</span>
        <div class="divider"></div>

        <div class="skills">
            <span class="skill-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/></svg>
                </span>
                طراح سایت
            </span>
            <span class="skill-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 4h2v5l-1-.75L9 9V4zm9 16H6V4h1v9l3-2.25L13 13V4h5v16z"/></svg>
                </span>
                طراح فتوشاپ
            </span>
            <span class="skill-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M5 3h14v2H5V3zm0 4h14v2H5V7zm0 4h14v2H5v-2zm0 4h10v2H5v-2zm0 4h10v2H5v-2z"/></svg>
                </span>
                فروشنده فونت
            </span>
            <span class="skill-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M5 3h14v2H5V3zm0 4h14v2H5V7zm0 4h14v2H5v-2zm0 4h10v2H5v-2zm0 4h10v2H5v-2z"/></svg>
                </span>
                طراح فونت
            </span>
            <span class="skill-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-2l2 4h-3l-2-4H8l2 4H7L5 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V4h-4z"/></svg>
                </span>
                تدوینگر
            </span>
            <span class="skill-item">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
                </span>
                تدوینگر صدا
            </span>
            <span class="skill-item" onclick="showSites()">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                </span>
                سایت ها
            </span>
        </div>

        <div class="socials">
            <a href="#" class="social-btn primary">
                <span class="icon">
                    <svg viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.15 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
                </span>
                تماس
            </a>

            <a href="https://eitaa.com/ya_ali_ir" target="_blank" class="social-btn">
                <span class="icon">
                    <img src="https://cdn.imgurl.ir/uploads/v63993_IMG_20260620_175231_492.png" alt="ایتا" />
                </span>
                ایتا
            </a>

            <a href="https://rubika.ir/mohamad_hossein_ev18" target="_blank" class="social-btn">
                <span class="icon">
                    <img src="https://cdn.imgurl.ir/uploads/g827592_IMG_20260620_174834_450.png" alt="روبیکا" />
                </span>
                روبیکا
            </a>
        </div>

        <div class="footer-note">
            <span class="icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z"/>
                </svg>
            </span>
            هنر یک دنیای عجیبه!
        </div>

    </div>

    <!-- ====================================================
    صفحه "سایت ها" با کارت‌های مجزا (۱ در ۱)
    ==================================================== -->
    <div class="site-page" id="sitePage">
        <div class="site-box">
            <span class="header-icon">🌐</span>
            <h2>سایت‌های من</h2>
            <div class="divider-site"></div>
            <p class="subtitle">✨ پروژه‌های آنلاین من</p>

            <div class="site-grid">

                <!-- ===== کارت کالفود ===== -->
                <a href="https://zeroxgame74-afk.github.io/call-food.ir/" target="_blank" class="site-card callfood">
                    <div class="site-icon">🍽️</div>
                    <div class="site-name">کالفود</div>
                    <div class="site-desc">غذاهای ویژه</div>
                    <div class="site-thumb">
                        <img src="https://cdn.imgurl.ir/uploads/g827592_IMG_20260620_174834_450.png" alt="کالفود" />
                    </div>
                </a>

                <!-- ===== کارت زروکس ===== -->
                <a href="#" target="_blank" class="site-card zerox">
                    <div class="site-icon">🛡️</div>
                    <div class="site-name">زروکس</div>
                    <div class="site-desc">سایت گیم</div>
                    <div class="site-thumb">
                        <span class="placeholder">🎮</span>
                    </div>
                </a>

                <!-- ===== کارت پیش‌فرض ۱ ===== -->
                <a href="#" target="_blank" class="site-card default">
                    <div class="site-icon">🎨</div>
                    <div class="site-name">سایت دیگه</div>
                    <div class="site-desc">توضیح کوتاه</div>
                    <div class="site-thumb">
                        <span class="placeholder">🖼️</span>
                    </div>
                </a>

                <!-- ===== کارت پیش‌فرض ۲ ===== -->
                <a href="#" target="_blank" class="site-card default">
                    <div class="site-icon">📱</div>
                    <div class="site-name">سایت چهارم</div>
                    <div class="site-desc">توضیح کوتاه</div>
                    <div class="site-thumb">
                        <span class="placeholder">📲</span>
                    </div>
                </a>

            </div>

            <button class="close-btn" onclick="hideSites()">✕ بستن</button>
        </div>
    </div>

    <script>
        function showSites() {
            document.getElementById('sitePage').classList.add('show');
        }

        function hideSites() {
            document.getElementById('sitePage').classList.remove('show');
        }

        document.getElementById('sitePage').addEventListener('click', function(e) {
            if (e.target === this) {
                hideSites();
            }
        });
    </script>

</body>
                                                 </html>
